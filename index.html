<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Password Generator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ADMIN -->

    <div class="admin-banner">
        Admin - Ayaan Hashmi
    </div>

    <!-- PORTAL -->

    <div class="magic-circle"></div>

    <!-- LEFT QUOTE -->

    <div class="quote quote-left">
        We Never Lose Our Demons, We Only Learn To Live Above Them.
    </div>

    <!-- RIGHT QUOTE -->

    <div class="quote quote-right">
        The Bill Comes Due. Always.
    </div>

    <!-- PASSWORD GENERATOR -->

    <div class="container">

        <div class="box">

            <h1 class="title">Password Generator</h1>

            <div class="result-row">

                <input
                    type="text"
                    id="result"
                    readonly
                    placeholder="Generated Password">

                <button id="copyBtn">
                    Copy
                </button>

            </div>

            <div class="form-row">

                <label for="length">
                    Password Length
                </label>

                <input
                    type="number"
                    id="length"
                    min="5"
                    max="25"
                    value="12">

            </div>

            <div class="form-row">

                <label for="numbers">
                    Include Numbers
                </label>

                <input
                    type="checkbox"
                    id="numbers"
                    checked>

            </div>

            <div class="form-row">

                <label for="symbols">
                    Include Symbols
                </label>

                <input
                    type="checkbox"
                    id="symbols"
                    checked>

            </div>

            <button id="generate">
                Generate Password
            </button>

            <div id="message"></div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
